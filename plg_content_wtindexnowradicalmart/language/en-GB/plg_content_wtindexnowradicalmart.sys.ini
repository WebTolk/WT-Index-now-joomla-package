PLG_WTINDEXNOWRADICALMART = "Content - WT IndexNow - RadicalMart"
PLG_WTINDEXNOWRADICALMART_DESC = "The plugin allows you to send URLs of Joomla RadicalMart products and categories for reindexing to search engines using the IndexNow protocol. Sending manually using the toolbar button in the list of products or categories, or when editing an product or category, or in automatic mode (using the Joomla task scheduler plugin). For this plugin to work, the main plugin <code>System - WT Index now</code> must be installed, configured and enabled."
PLG_WTINDEXNOWRADICALMART_BUTTON_LABEL = "IndexNow"