PLG_WTINDEXNOWRADICALMART = "Content - WT IndexNow - RadicalMart"
PLG_WTINDEXNOWRADICALMART_DESC = "The plugin allows you to send URLs of Joomla RadicalMart products and categories for reindexing to search engines using the IndexNow protocol. Sending manually using the toolbar button in the list of products or categories, or when editing an product or category, or in automatic mode (using the Joomla task scheduler plugin). For this plugin to work, the main plugin <code>System - WT Index now</code> must be installed, configured and enabled."
PLG_WTINDEXNOWRADICALMART_BUTTON_LABEL = "IndexNow"
PLG_WTINDEXNOWRADICALMART_SEND_UNPUBLISHED = "Send trashed/unpublished products or categories?"
PLG_WTINDEXNOWRADICALMART_SEND_UNPUBLISHED_DESC = "If not, then only new and modified products or categories will be sent to IndexNow. And the search engines will sort out the deleted or unpublished products or categories themselves somehow."
PLG_WTINDEXNOWRADICALMART_ELEMENTS_SENT_SUCCESSFULLY="IndexNow: Successfully sent %s product or category(s)"
PLG_WTINDEXNOWRADICALMART_ELEMENTS_SENT_UNSUCCESSFULLY="IndexNow: Error sending %s product or category(s). Check the logs."
PLG_WTINDEXNOWRADICALMART_SHOW_BUTTON = "Show the IndexNow button?"
PLG_WTINDEXNOWRADICALMART_SHOW_BUTTON_DESC = "Show the IndexNow button in the list of products or categories and on the product or category editing page? Sending to IndexNow is instantaneous."