PLG_HWTINDEXNOWSWJPROJECTS = "Content - WT IndexNow - SW JProjects"
PLG_HWTINDEXNOWSWJPROJECTS_DESC = "The plugin allows you to send URLs of categories, projects, versions, and documentation of the SW JProjects component for reindexing to search engines using the IndexNow protocol. Sending manually using the toolbar button in the list or when editing an item, or in automatic mode (using the Joomla task scheduler plugin). For this plugin to work, the main plugin <code>System - WT Index now</code> must be installed, configured and enabled."
PLG_WTINDEXNOWSWJPROJECTS_SEND_UNPUBLISHED = "Send trashed/unpublished elements?"
PLG_WTINDEXNOWSWJPROJECTS_SEND_UNPUBLISHED_DESC = "If not, then only new and modified elements will be sent to IndexNow. And the search engines will sort out the deleted or unpublished elements themselves somehow."
PLG_WTINDEXNOWSWJPROJECTS_ELEMENTS_SENT_SUCCESSFULLY="IndexNow: Successfully sent %s element(s)"
PLG_WTINDEXNOWSWJPROJECTS_ELEMENTS_SENT_UNSUCCESSFULLY="IndexNow: Error sending %s element(s). Check the logs."
PLG_WTINDEXNOWSWJPROJECTS_BUTTON_LABEL = "IndexNow"
PLG_WTINDEXNOWSWJPROJECTS_SHOW_BUTTON = "Show the IndexNow button?"
PLG_WTINDEXNOWSWJPROJECTS_SHOW_BUTTON_DESC = "Show the IndexNow button in the list of elements and on the article element page? Sending to IndexNow is instantaneous."