PLG_HWTINDEXNOWSWJPROJECTS = "Content - WT IndexNow - SW JProjects"
PLG_HWTINDEXNOWSWJPROJECTS_DESC = "The plugin allows you to send URLs of categories, projects, versions, and documentation of the SW JProjects component for reindexing to search engines using the IndexNow protocol. Sending manually using the toolbar button in the list or when editing an item, or in automatic mode (using the Joomla task scheduler plugin). For this plugin to work, the main plugin <code>System - WT Index now</code> must be installed, configured and enabled."
PLG_WTINDEXNOWCONTENT_BUTTON_LABEL = "IndexNow"