PLG_WTINDEXNOWPHOCACART = "Content - WT IndexNow - Phoca Cart"
PLG_WTINDEXNOWPHOCACART_DESC = "The plugin allows you to send URLs of Phoca Cart Joomla component products and categories for reindexing to search engines using the IndexNow protocol. Sending manually using the toolbar button in the list of products and categories, or when editing a product or category, or in automatic mode (using the Joomla task scheduler plugin). For this plugin to work, the main plugin <code>System - WT Index now</code> must be installed, configured and enabled."
PLG_WTINDEXNOWPHOCACART_ELEMENTS_SENT_SUCCESSFULLY="IndexNow: Successfully sent %s element(s)"
PLG_WTINDEXNOWPHOCACART_ELEMENTS_SENT_UNSUCCESSFULLY="IndexNow: Error sending %s element(s). Check the logs."
PLG_WTINDEXNOWPHOCACART_BUTTON_LABEL = "IndexNow"
PLG_WTINDEXNOWPHOCACART_SHOW_BUTTON = "Show the IndexNow button?"
PLG_WTINDEXNOWPHOCACART_SHOW_BUTTON_DESC = "Show the IndexNow button in the list of products or categories and on the file or category editing page? Sending to IndexNow is instantaneous."