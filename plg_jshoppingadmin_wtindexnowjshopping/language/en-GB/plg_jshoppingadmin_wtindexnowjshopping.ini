PLG_WTINDEXNOWJSHOPPING = "Jshoppingadmin - WT IndexNow - Articles"
PLG_WTINDEXNOWJSHOPPING_DESC = "The plugin allows you to send the URLs of Joomshopping products and product categories for reindexing to search engines using the IndexNow protocol. Sending manually using the toolbar button in the list of products/categories, or when editing a product/category, or in automatic mode (using the Joomla task scheduler plugin). For this plugin to work, the main plugin <code>System - WT Index now</code> must be installed, configured and enabled."
PLG_WTINDEXNOWJSHOPPING_SEND_UNPUBLISHED = "Send trashed/unpublished products/categories?"
PLG_WTINDEXNOWJSHOPPING_SEND_UNPUBLISHED_DESC = "If not, then only new and modified products/categories will be sent to IndexNow. And the search engines will sort out the deleted or unpublished materials themselves somehow."
PLG_WTINDEXNOWJSHOPPING_ARTICLES_SENT_SUCCESSFULLY="IndexNow: Successfully sent %s element(s)"
PLG_WTINDEXNOWJSHOPPING_ARTICLES_SENT_UNSUCCESSFULLY="IndexNow: Error sending %s element(s). Check the logs."
PLG_WTINDEXNOWJSHOPPING_BUTTON_LABEL = "IndexNow"
PLG_WTINDEXNOWJSHOPPING_SHOW_BUTTON = "Show the IndexNow button?"
PLG_WTINDEXNOWJSHOPPING_SHOW_BUTTON_DESC = "Show the IndexNow button in the list of products/categories and on the article editing page? Sending to IndexNow is instantaneous."