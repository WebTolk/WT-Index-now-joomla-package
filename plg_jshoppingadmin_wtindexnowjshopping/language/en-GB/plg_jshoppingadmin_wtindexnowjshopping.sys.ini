PLG_WTINDEXNOWJSHOPPING = "Jshoppingadmin - WT IndexNow - Articles"
PLG_WTINDEXNOWJSHOPPING_DESC = "The plugin allows you to send the URLs of Joomshopping products and product categories for reindexing to search engines using the IndexNow protocol. Sending manually using the toolbar button in the list of products/categories, or when editing a product/category, or in automatic mode (using the Joomla task scheduler plugin). For this plugin to work, the main plugin <code>System - WT Index now</code> must be installed, configured and enabled."
PLG_WTINDEXNOWJSHOPPING_BUTTON_LABEL = "IndexNow"