PLG_WTINDEXNOWPHOCADOWNLOAD = "Content - WT IndexNow - Phoca Download"
PLG_WTINDEXNOWPHOCADOWNLOAD_DESC = "The plugin allows you to send URLs of Phoca Download Joomla component files and categories for reindexing to search engines using the IndexNow protocol. Sending manually using the toolbar button in the list of files and categories, or when editing a file or category, or in automatic mode (using the Joomla task scheduler plugin). For this plugin to work, the main plugin <code>System - WT Index now</code> must be installed, configured and enabled."
PLG_WTINDEXNOWPHOCADOWNLOAD_SEND_UNPUBLISHED = "Send trashed/unpublished files or categories?"
PLG_WTINDEXNOWPHOCADOWNLOAD_SEND_UNPUBLISHED_DESC = "If not, then only new and modified files or categories will be sent to IndexNow. And the search engines will sort out the deleted or unpublished files or categories themselves somehow."
PLG_WTINDEXNOWPHOCADOWNLOAD_ELEMENTS_SENT_SUCCESSFULLY="IndexNow: Successfully sent %s element(s)"
PLG_WTINDEXNOWPHOCADOWNLOAD_ELEMENTS_SENT_UNSUCCESSFULLY="IndexNow: Error sending %s element(s). Check the logs."
PLG_WTINDEXNOWPHOCADOWNLOAD_BUTTON_LABEL = "IndexNow"
PLG_WTINDEXNOWPHOCADOWNLOAD_SHOW_BUTTON = "Show the IndexNow button?"
PLG_WTINDEXNOWPHOCADOWNLOAD_SHOW_BUTTON_DESC = "Show the IndexNow button in the list of files or categories and on the file or category editing page? Sending to IndexNow is instantaneous."