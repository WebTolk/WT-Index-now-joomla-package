PLG_WTINDEXNOWCONTACTS = "Content - WT IndexNow - Contacts"
PLG_WTINDEXNOWCONTACTS_DESC = "The plugin allows you to send URLs of Joomla contacts for reindexing to search engines using the IndexNow protocol. Sending manually using the toolbar button in the list of contacts, or when editing a contact, or in automatic mode (using the Joomla task scheduler plugin). For this plugin to work, the main plugin <code>System - WT Index now</code> must be installed, configured and enabled."
PLG_WTINDEXNOWCONTACTS_SEND_UNPUBLISHED = "Send trashed/unpublished contacts?"
PLG_WTINDEXNOWCONTACTS_SEND_UNPUBLISHED_DESC = "If not, then only new and modified Contacts will be sent to IndexNow. And the search engines will sort out the deleted or unpublished materials themselves somehow."
PLG_WTINDEXNOWCONTACTS_CONTACTS_SENT_SUCCESSFULLY="IndexNow: Successfully sent %s contact(s)"
PLG_WTINDEXNOWCONTACTS_CONTACTS_SENT_UNSUCCESSFULLY="IndexNow: Error sending %s contact(s). Check the logs."
PLG_WTINDEXNOWCONTACTS_BUTTON_LABEL = "IndexNow"
PLG_WTINDEXNOWCONTACTS_SHOW_BUTTON = "Show the IndexNow button?"
PLG_WTINDEXNOWCONTACTS_SHOW_BUTTON_DESC = "Show the IndexNow button in the list of contacts and on the contact editing page? Sending to IndexNow is instantaneous."