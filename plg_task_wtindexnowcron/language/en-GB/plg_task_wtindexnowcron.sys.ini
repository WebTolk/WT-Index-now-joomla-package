PLG_WTINDEXNOW = "System - WT IndexNow"
PLG_WTINDEXNOW_DESC = "The plugin generates a key and creates a key file to verify ownership of the host when sending an HTTP request to <a href=\"https://www.indexnow.org/\" target=\"_blank\">IndexNow</a>. There are additional provider plugins for the plugin that can only work with this plugin."