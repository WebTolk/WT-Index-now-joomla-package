PLG_WTINDEXNOW="Задача - WT IndexNow"
PLG_WTINDEXNOW_DESC="<p>Плагин генерирует ключ и создает файл с ключом для подтверждения права собственности на хост при отправке HTTP-запроса в <a href=\"https://www.indexnow.org/\" target=\"_blank\">IndexNow</a>. Для плагина существуют дополнительные плагины-провайдеры, которые могут работать только вместе с данным плагином.</p>"