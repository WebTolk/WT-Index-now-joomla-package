PLG_WTINDEXNOW="System - WT Index now"
PLG_WTINDEXNOW_DESC="<p>A plugin for sending messages from the Joomla site to the Telegram bot. The plugin provides a simple way to send information from Joomla to chats and channels using messages to the bot. Developers can use it for their extensions.</p>"
PLG_HWTINDEXNOW_URLS_TODAY_SENT_COUNT = "Url sent today"
PLG_HWTINDEXNOW_URLS_TODAY_SENT_COUNT_DESC = "Counter of URLs sent in IndexNow. The daily limit is 10000."
PLG_WTINDEXNOW_MODE = "Mode"
PLG_WTINDEXNOW_MODE_DESC="In mode <code>now</code> the url will be sent for reindexing at the time of saving, changing the state (published / unpublished). Mode <code>queue</code> - urls are written to the database in a queue. The Joomla task scheduler plugin sends them for reindexing according to a schedule, and then clears the queue. Create a task for this and configure its execution according to a schedule."
PLG_WTINDEXNOW_MODE_NOW="Now"
PLG_WTINDEXNOW_MODE_QUEUE="Queue"
PLG_WTINDEXNOW_INDEX_NOW_URLS_LIMIT="URL limit per day"
PLG_WTINDEXNOW_INDEX_NOW_URLS_LIMIT_DESC="According to <a href=\"https://www.indexnow.org/documentation \" target=\"_blank\">IndexNow documentation</a> the url sending limit per day is 10000."
PLG_WTINDEXNOW_INDEXNOW_URL = "IndexNow server"
PLG_WTINDEXNOW_INDEXNOW_URL_DESC = "Search engines that support the <code>IndexNow</code> protocol <a href=\"https://www.indexnow.org/searchengines \" target=\"_blank\">exchange data with each other</a> search engines."

