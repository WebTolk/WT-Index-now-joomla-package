PLG_WTINDEXNOWCONTENT = "Content - WT IndexNow - Materials"
PLG_WTINDEXNOWCONTENT_DESC = "The plugin allows you to send URLs of Joomla articles for reindexing to search engines using the IndexNow protocol. Sending manually using the toolbar button in the list of articles, or when editing an article, or in automatic mode (using the Joomla task scheduler plugin). For this plugin to work, the main plugin <code>System - WT Index now</code> must be installed, configured and enabled."
PLG_HWTINDEXNOWCONTENT_SEND_UNPUBLISHED = "Send trashed/unpublished articles?"
PLG_HWTINDEXNOWCONTENT_SEND_UNPUBLISHED_DESC = "If not, then only new and modified articles will be sent to IndexNow. And the search engines will sort out the deleted or unpublished materials themselves somehow."
PLG_WTINDEXNOWCONTENT_ARTICLES_SENT_SUCCESSFULLY="IndexNow: Successfully sent %s article(s)"
PLG_WTINDEXNOWCONTENT_ARTICLES_SENT_UNSUCCESSFULLY="IndexNow: Error sending %s article(s). Check the logs."