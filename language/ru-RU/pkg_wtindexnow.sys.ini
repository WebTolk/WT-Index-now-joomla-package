PKG_WTINDEXNOW_WHATS_NEW="<h3>v.1.0.0 Что нового?</h3><h4>Первая версия расширения</h4><p>Пакет плагинов предназначен для отправки URL сайтов на Joomla в поисковые системы на переиндексацию по протоколу <a href=\"http://indexnow.org\" target=\"_blank\">IndexNow</a>. Согласно документации протокол поддерживают все крупнейшие поисковые системы, кроме Google. Протокол служит для получения от сайтов URL, которые нужно переиндексировать заново или проиндексировать в первый раз как можно быстрее. Отправка адресов сайта таким образом существенно ускорит индексацию нового или изменённого контента поисковыми системами. Поисковые системы по этому протоколу обмениваются друг с другом данными, поэтому отправив URL в одну из них вы сообщаете их сразу всем.</p><p> По протоколу IndexNow в сутки можно отправить не более 10000 URL адресов. Учитывайте это во время работы с контентом.</p><h4>Режимы работы</h4><p><strong>Системный плагин <code>WT IndexNow</code></strong> создаёт ключ для идентификации запросов сайта и занимается отправкой адресов согласно настройкам. Зайдите в его параметры и сохраните их для автоматической генерации ключа. В корне сайта появится файл с таким же именем и содержанием. Это нормально и необходимо для использования протокола IndexNow.</p><p><strong>Отправка сейчас</strong> - в этом режиме отправка URL происходит в момент сохранения/публикации элемента. <strong>Отправка в очередь</strong> - URL для переиндексации записываются в базу данных, а на переиндексацию их отправляет плагин планировщика задач по расписанию (например раз в минуту, раз в 5 минут).</p><p>Также есть возможность отправлять URL вручную с помощью кнопки в тулбаре в списке элементов или на странице редактирования элемента.</p><h4>Плагины-провайдеры</h4><p>Плагины-провайдеры созданы для разных компонентов. Они добавляют кнопки в тулбар компонентов и создают ссылки для отправки через основной плагин.</p><p>На данный момент в пакете представлены провайдеры для следующих компонентов:</p><ul><li>материалы Joomla</li><li>категории Joomla</li><li>контакты Joomla</li><li><a href=\"https://web-tolk.ru/dev/components/sw-jprojects\" target=\"_blank">SW JProjects</a> <a href=\"https://github.com/WebTolk/SWJProjects\" target=\"_blank">(GitHub repo)</a></li><li><a href=\"https://joomshopping.com\" target=\"_blank">JoomShopping</a></li><li><a href=\"https://www.phoca.cz/phocadownload\" target=\"_blank">Phoca Download</a></li><li><a href=\"https://www.phoca.cz/phocacart\" target=\"_blank">Phoca Cart</a></li><li>RadicalMart</li></ul>"
