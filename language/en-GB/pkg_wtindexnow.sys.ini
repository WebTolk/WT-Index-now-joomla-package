PKG_WTINDEXNOW_MAYBE_INTERESTING="<h4>It may be interesting</h4><ul class=\"list-group\"><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/en/dev/web-assets\" target=\"_blank\" title=\"Go to https://web-tolk.ru\">Joomla 4 - Joomla 5 Web Assets.</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/en/dev/joomshopping\" target=\"_blank\" title=\"Go to https://web-tolk.ru\">JoomShopping extensions</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/en/dev/joomla-plugins\" target=\"_blank\" title=\"Go to https://web-tolk.ru\">Joomla plugins</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/en/dev/joomla-modules\" target=\"_blank\" title=\"Go to https://web-tolk.ru\">Joomla modules</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/en/dev/components\" target=\"_blank\" title=\"Go to https://web-tolk.ru\">Joomla components</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/en/dev/joomla-libraries\" target=\"_blank\" title=\"Go to https://web-tolk.ru\">Joomla libraries for developers.</a></li></ul>"
PKG_WTINDEXNOW_WHATS_NEW="<h3>v.1.0.0 What's new?</h3><h4>The first version of the extension</h4><p>The plugin package is designed to send the URLs of Joomla sites to search engines for reindexing using the <a href=\"https://indexnow.org\" target=\"_blank\">IndexNow</a>. According to the documentation, the protocol is supported by all major search engines except Google. The protocol is used to get URLs from sites that need to be reindexed or indexed for the first time as quickly as possible. Sending site addresses in this way will significantly speed up the indexing of new or modified content by search engines. Search engines use this protocol to exchange data with each other, so by sending a URL to one of them, you share it with everyone at once.</p><p>Using the IndexNow protocol, no more than 10,000 URLs can be sent per day. Keep this in mind when working with content.</p><h4>Modes</h4><p>The <strong>system plugin <code>WT IndexNow</code></strong> creates a key for identifying site requests and sends addresses according to the settings. Go to its parameters and save them for automatic key generation. A file with the same name and content will appear in the root of the site. This is normal and necessary for using the IndexNow protocol.</p><p>Sending <strong>now</strong> - in this mode, the URL is sent when the item is saved/published. <strong>Queue</strong> - URLs for reindexing are written to the database, and the task scheduler plugin sends them for reindexing according to a schedule (for example, once a minute, once every 5 minutes).</p><p>It is also possible to send the URL manually using the toolbar button in the list of items or on the item editing page.</p><h4>Plug-in providers</h4><p>Plug-ins providers are created for different components. They add buttons to the component toolbar and create links to send through the main plugin.</p><p>Currently, the package includes providers for the following components:</p><ul><li>Joomla articles and articles categories</li><li>Joomla contacts and contacts categories</li><li><a href=\"https://web-tolk.ru/en/dev/components/sw-jprojects\" target=\"_blank">SW JProjects</a> <a href=\"https://github.com/WebTolk/SWJProjects\" target=\"_blank">(GitHub repo)</a></li><li><a href=\"https://joomshopping.com\" target=\"_blank">JoomShopping</a> <a href=\"https://extensions.joomla.org/extension/joomshopping/\" target=\"_blank">Joomla Extensions Directory</a></li><li><a href=\"https://www.phoca.cz/phocadownload\" target=\"_blank">Phoca Download</a></li><li><a href=\"https://www.phoca.cz/phocacart\" target=\"_blank">Phoca Cart</a></li><li><a href=\"https://radicalmart.ru\" target=\"_blank">RadicalMart</a></li></ul></ul>"
